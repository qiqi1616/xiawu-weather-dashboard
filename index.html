<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国人寿财险厦门市分公司 - 厦钨集团标的天气预报预警监控看板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-primary: #0B1120;
  --bg-secondary: #131C31;
  --bg-card: #1a2332;
  --border: rgba(59, 130, 246, 0.2);
  --text-primary: #E2E8F0;
  --text-secondary: #94A3B8;
  --accent-blue: #3B82F6;
  --accent-orange: #F97316;
  --accent-cyan: #06B6D4;
  --warning-red: #EF4444;
  --warning-orange: #F97316;
  --warning-yellow: #EAB308;
  --warning-blue: #3B82F6;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}
.header {
  background: linear-gradient(180deg, var(--bg-secondary) 0%, transparent 100%);
  padding: 16px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  gap: 12px;
}
.header h1 {
  font-size: 20px;
  font-weight: 600;
  background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.header-controls {
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 8px;
}
.filter-label {
  font-size: 12px;
  color: var(--text-secondary);
  white-space: nowrap;
}
.filter-select {
  background: var(--bg-card);
  border: 1px solid rgba(59, 130, 246, 0.5);
  color: var(--text-primary);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  min-width: 140px;
  transition: all 0.2s;
}
.filter-select:hover {
  border-color: var(--accent-blue);
  background: rgba(59, 130, 246, 0.15);
}
.filter-select:focus {
  outline: none;
  border-color: var(--accent-cyan);
  box-shadow: 0 0 0 2px rgba(6, 182, 212, 0.2);
}
.header-info {
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 13px;
  color: var(--text-secondary);
}
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #10B981;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.main-container {
  display: flex;
  height: calc(100vh - 80px);
}
.map-section {
  flex: 0 0 70%;
  position: relative;
  padding: 16px;
}
.map-container {
  width: 100%;
  height: 100%;
  background: radial-gradient(ellipse at center, rgba(30,41,59,0.5) 0%, transparent 70%);
  border-radius: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
  position: relative;
}
#chinaMap { width: 100%; height: 100%; }

/* 缩放控制按钮 */
.zoom-controls {
  position: absolute;
  top: 12px;
  right: 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 10;
}
.zoom-btn {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  background: rgba(19, 28, 49, 0.9);
  border: 1px solid rgba(59, 130, 246, 0.3);
  color: #E2E8F0;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.zoom-btn:hover {
  background: rgba(59, 130, 246, 0.3);
  border-color: rgba(59, 130, 246, 0.6);
}
.zoom-level {
  font-size: 10px;
  text-align: center;
  color: var(--text-secondary);
  padding: 2px 0;
}
.panel-section {
  flex: 0 0 30%;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  padding: 16px;
}
.panel-section::-webkit-scrollbar { width: 6px; }
.panel-section::-webkit-scrollbar-track { background: transparent; }
.panel-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.summary-card {
  background: linear-gradient(135deg, var(--bg-card) 0%, rgba(239,68,68,0.1) 100%);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
}
.summary-card h3 {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.summary-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.stat-item { text-align: center; }
.stat-value {
  font-size: 28px;
  font-weight: 700;
  color: var(--warning-red);
}
.stat-label { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.warning-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  margin-left: 8px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.warning-badge:hover { opacity: 0.8; text-decoration: underline; }
.warning-badge.red { background: rgba(239,68,68,0.2); color: var(--warning-red); }
.warning-badge.orange { background: rgba(249,115,22,0.2); color: var(--warning-orange); }
.warning-badge.yellow { background: rgba(234,179,8,0.2); color: var(--warning-yellow); }
.warning-badge.blue { background: rgba(59,130,246,0.2); color: var(--warning-blue); }
.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin: 20px 0 12px;
  padding-left: 12px;
  border-left: 3px solid var(--accent-blue);
}
.city-list { display: flex; flex-direction: column; gap: 8px; }
.city-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.city-item:hover { border-color: var(--accent-blue); background: rgba(59,130,246,0.1); }
.city-item.active { border-color: var(--accent-cyan); background: rgba(6,182,212,0.1); }
.city-item.has-warning { border-left: 3px solid var(--warning-orange); }
.city-item.has-severe { border-left: 3px solid #EF4444; background: linear-gradient(90deg, rgba(239,68,68,0.1) 0%, transparent 50%); }
.severe-weather { color: #F97316 !important; font-weight: 600; }
.city-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  flex-wrap: wrap;
  gap: 4px;
}
.city-name { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.city-count { font-size: 11px; color: var(--text-secondary); background: rgba(59,130,246,0.2); padding: 2px 6px; border-radius: 4px; }
.city-weather { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.temp { color: var(--text-primary); font-weight: 500; }
.warning-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.prop-list { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); max-height: 300px; overflow-y: auto; }
.prop-item {
  font-size: 11px;
  color: var(--text-secondary);
  padding: 4px 0;
  border-bottom: 1px dashed rgba(255,255,255,0.05);
}
.prop-item:last-child { border-bottom: none; }
.prop-org { color: var(--accent-blue); }
.prop-segment { color: var(--accent-cyan); font-size: 10px; }
.expand-btn {
  background: rgba(59, 130, 246, 0.2);
  border: 1px solid rgba(59, 130, 246, 0.3);
  color: var(--accent-cyan);
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
}
.expand-btn:hover { background: rgba(59, 130, 246, 0.3); }
.forecast-section {
  margin-top: 10px;
  padding: 10px;
  background: rgba(249,115,22,0.1);
  border-radius: 6px;
  border: 1px solid rgba(249,115,22,0.2);
}
.forecast-day {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
  font-size: 11px;
}
.forecast-day:not(:last-child) {
  border-bottom: 1px dashed rgba(255,255,255,0.1);
}
.forecast-date {
  color: var(--text-secondary);
  min-width: 40px;
}
.forecast-icon { font-size: 14px; }
.forecast-text {
  color: var(--text-primary);
  flex: 1;
}
.forecast-temp {
  color: var(--warning-orange);
  font-weight: 600;
}
.impact-item { margin-top: 12px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 6px; font-size: 12px; }
.impact-item.high { border-left: 3px solid var(--warning-red); }
.impact-item.low { border-left: 3px solid var(--warning-yellow); }
.tooltip {
  position: absolute;
  background: var(--bg-card);
  border: 1px solid var(--accent-blue);
  border-radius: 8px;
  padding: 12px;
  font-size: 12px;
  pointer-events: none;
  z-index: 500;
  min-width: 200px;
  max-width: 320px;
  display: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.tooltip h4 { color: var(--accent-cyan); margin-bottom: 6px; }
.tooltip p { color: var(--text-secondary); margin: 3px 0; }

/* 预警详情弹窗 */
.warning-detail-popup {
  position: fixed;
  background: var(--bg-card);
  border: 1px solid var(--warning-orange);
  border-radius: 10px;
  padding: 16px;
  font-size: 12px;
  z-index: 600;
  min-width: 280px;
  max-width: 380px;
  max-height: 400px;
  overflow-y: auto;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  pointer-events: auto;
}
.warning-detail-popup .wd-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.warning-detail-popup .wd-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--warning-orange);
}
.warning-detail-popup .wd-close {
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 18px;
  line-height: 1;
  padding: 2px 6px;
  border-radius: 4px;
  background: rgba(255,255,255,0.05);
}
.warning-detail-popup .wd-close:hover {
  background: rgba(255,255,255,0.15);
  color: var(--text-primary);
}
.warning-detail-popup .wd-item {
  margin-bottom: 12px;
  padding: 10px;
  background: rgba(0,0,0,0.2);
  border-radius: 6px;
  border-left: 3px solid var(--warning-orange);
}
.warning-detail-popup .wd-item.severity-red { border-left-color: #EF4444; }
.warning-detail-popup .wd-item.severity-orange { border-left-color: #F97316; }
.warning-detail-popup .wd-item.severity-yellow { border-left-color: #EAB308; }
.warning-detail-popup .wd-item.severity-blue { border-left-color: #3B82F6; }
.warning-detail-popup .wd-item-title {
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 6px;
  font-size: 13px;
}
.warning-detail-popup .wd-item-row {
  display: flex;
  gap: 4px;
  margin: 3px 0;
  color: var(--text-secondary);
}
.warning-detail-popup .wd-item-row label {
  color: var(--text-secondary);
  min-width: 60px;
  flex-shrink: 0;
}
.warning-detail-popup .wd-item-row span {
  color: var(--text-primary);
}

/* 城市标记样式 */
.city-marker { cursor: pointer; transition: transform 0.2s; }
.city-marker:hover { transform: scale(1.2); }
.city-marker.selected .marker-ring { stroke: #06B6D4; stroke-width: 3; }
.city-marker.filtered-out { opacity: 0.2; pointer-events: none; }
.legend {
  position: absolute;
  bottom: 24px;
  left: 24px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-size: 11px;
}
.legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }
.legend-dot.blue { background: var(--accent-blue); }
.legend-dot.orange { background: var(--warning-orange); }
.legend-dot.red { background: var(--warning-red); }
.legend-dot.cyan { background: var(--accent-cyan); }
.refresh-time { font-size: 11px; color: var(--text-secondary); }
.filter-stats {
  font-size: 11px;
  color: var(--accent-cyan);
  background: rgba(6,182,212,0.1);
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid rgba(6,182,212,0.3);
}
@media (max-width: 900px) {
  .main-container { flex-direction: column; }
  .map-section { flex: 0 0 60vh; }
  .panel-section { flex: 1; border-left: none; border-top: 1px solid var(--border); }
  .header { flex-direction: column; align-items: flex-start; }
  .header-controls { width: 100%; justify-content: flex-start; }
}
</style>
</head>

<header class="header">
  <h1>🛡️ 中国人寿财险厦门市分公司 · 厦钨集团标的天气预报预警监控看板</h1>
  <div class="header-controls">
    <div class="filter-group">
      <span class="filter-label">客户板块:</span>
      <select class="filter-select" id="segmentFilter" onchange="applyFilters()"><option value="厦钨集团" selected>厦钨集团</option></select>
    </div>
    <div class="filter-group">
      <span class="filter-label">支公司:</span>
      <select class="filter-select" id="orgFilter" onchange="applyFilters()">
        <option value="">全部</option>
        <option value="思明支公司">思明支公司</option>
        </select>
    </div>
    <span class="filter-stats" id="filterStats">18城市 / 35标的</span>
    <div class="header-info">
      <span><span class="status-dot"></span> 定时更新</span>
      <span class="refresh-time" id="refreshTime">--</span>
      <span class="refresh-time" id="warningRefreshTime" style="color:var(--warning-orange)">预警: --</span>
    </div>
  </div>
</header>

  const minLon = 73, maxLon = 136;

  const width = 1000, height = 800;

// ========== 筛选函数 ==========
function isCityFiltered(cityName) {
  const city = CITY_DATA[cityName];
  if (!city) return true;
  
  // 检查客户板块筛选
  if (currentSegment && !city.segments.includes(currentSegment)) {
    return true;
  }
  
  // 检查支公司筛选
  if (currentOrg && !city.orgs.includes(currentOrg)) {
    return true;
  }
  
  return false;
}

function getFilteredCities() {
  return Object.keys(CITY_DATA).filter(name => !isCityFiltered(name));
}

function getFilteredProps(cityName) {
  const city = CITY_DATA[cityName];
  if (!city) return [];
  
  let props = city.props;
  
  // 根据筛选条件过滤props
  if (currentSegment) {
    props = props.filter(p => p.segment === currentSegment);
  }
  if (currentOrg) {
    props = props.filter(p => p.org === currentOrg);
  }
  
  return props;
}

// ========== 预警过滤函数 ==========
function filterWarnings(warnings) {
  if (!warnings || !Array.isArray(warnings)) return [];
  const now = Date.now();
  return warnings.filter(w => {
    const typeName = w.typeName || w.type || '';
    const isFocusType = FOCUS_WARNING_TYPES.some(ft => typeName.includes(ft));
    if (!isFocusType) return false;
    
    // 预警级别过滤：只保留黄/橙/红
    const severity = w.severity || w.level || '';
    if (!FOCUS_WARNING_LEVELS.includes(severity)) return false;
    
    const sender = w.sender || '';
    if (sender.includes('省气象台') || sender.includes('省气象局')) return false;
    if (sender.includes('中央气象台')) return false;
    
    if (w.status && w.status !== 'active') return false;
    
    // 客户端过期检查：如果endTime已过，视为失效
    if (w.endTime) {
      const endTs = new Date(w.endTime).getTime();
      if (!isNaN(endTs) && endTs < now) return false;
    }
    
    return true;
  });
}

// ========== 工具函数 ==========
function getMarkerSize(count) {
  if (count >= 30) return 6;
  if (count >= 10) return 5;
  if (count >= 5) return 4;
  return 3;
}

function getSeverityColor(severity) {
  const colors = {
    '红色': '#EF4444',
    '橙色': '#F97316',
    '黄色': '#EAB308',
    '蓝色': '#3B82F6'
  };
  return colors[severity] || '#3B82F6';
}

function getSeverityClass(severity) {
  const classes = {
    '红色': 'red',
    '橙色': 'orange',
    '黄色': 'yellow',
    '蓝色': 'blue'
  };
  return classes[severity] || 'blue';
}

function formatTime(date) {
  return date.toLocaleString('zh-CN', {
    month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit'
  });
}

// ========== 渲染函数 ==========
function renderCityMarkers() {
  const container = document.getElementById('cityMarkers');
  container.innerHTML = '';
  
  Object.entries(CITY_DATA).forEach(([cityName, city]) => {
    const pos = CITY_SVG_POS[cityName];
    if (!pos) return;
    
    const isFiltered = isCityFiltered(cityName);
    
    // 完全隐藏不匹配的城市标记
    if (isFiltered) return;
    
    const size = getMarkerSize(city.count);
    const warnings = cityWarningData[city.qid]?.warning || [];
    const hasWarning = warnings.length > 0;
    const isSelected = selectedMarkerCity === cityName;
    
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('class', `city-marker ${hasWarning ? 'has-warning' : ''} ${isSelected ? 'selected' : ''}`);
    g.setAttribute('data-city', cityName);
    g.setAttribute('transform', `translate(${pos.sx}, ${pos.sy})`);
    
    // 外圈光晕
    if (hasWarning) {
      const glow = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      glow.setAttribute('class', 'marker-glow');
      glow.setAttribute('cx', 0);
      glow.setAttribute('cy', 0);
      glow.setAttribute('r', 0);
      glow.setAttribute('fill', 'rgba(249,115,22,0.6)');
      
      if (!isSelected) {
        glow.innerHTML = `<animate attributeName="r" from="0" to="10" dur="3s" repeatCount="indefinite"/>
                          <animate attributeName="opacity" from="0.5" to="0" dur="3s" repeatCount="indefinite"/>`;
      } else {
        glow.setAttribute('opacity', '0');
      }
      g.appendChild(glow);
    }
    
    // 外圈圆环
    const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    ring.setAttribute('class', 'marker-ring');
    ring.setAttribute('cx', 0);
    ring.setAttribute('cy', 0);
    ring.setAttribute('r', size + 2);
    ring.setAttribute('fill', 'rgba(59,130,246,0.15)');
    ring.setAttribute('stroke', isSelected ? '#06B6D4' : (hasWarning ? 'rgba(249,115,22,0.7)' : 'rgba(59,130,246,0.5)'));
    ring.setAttribute('stroke-width', isSelected ? 3 : 1.5);
    g.appendChild(ring);
    
    // 中心圆点
    const inner = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    inner.setAttribute('class', 'inner');
    inner.setAttribute('cx', 0);
    inner.setAttribute('cy', 0);
    inner.setAttribute('r', size);
    inner.setAttribute('fill', hasWarning ? 'rgba(249,115,22,0.85)' : 'rgba(59,130,246,0.85)');
    inner.setAttribute('stroke', hasWarning ? '#F97316' : '#3B82F6');
    inner.setAttribute('stroke-width', isSelected ? 2.5 : 1.5);
    g.appendChild(inner);
    
    // 城市名称
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', 0);
    text.setAttribute('y', size + 10);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('fill', isSelected ? '#06B6D4' : '#E2E8F0');
    text.setAttribute('font-size', '8');
    text.setAttribute('font-weight', '600');
    text.textContent = cityName;
    g.appendChild(text);
    
        
    // 鼠标事件
    g.addEventListener('mouseenter', (e) => showTooltip(e, cityName));
    g.addEventListener('mouseleave', hideTooltip);
    g.addEventListener('click', () => toggleCitySelection(cityName));
    
    container.appendChild(g);
  });
}

function renderCityList() {
  const container = document.getElementById('cityList');
  container.innerHTML = '';
  
  const filteredCities = getFilteredCities();
  
  // 按预警优先级排序
  const sortedCities = filteredCities.sort((a, b) => {
    const aAllWarnings = getAllWarningsForCity(a);
    const bAllWarnings = getAllWarningsForCity(b);
    const aHasWarning = aAllWarnings.length > 0;
    const bHasWarning = bAllWarnings.length > 0;
    
    if (aHasWarning && !bHasWarning) return -1;
    if (!aHasWarning && bHasWarning) return 1;
    
    if (aHasWarning && bHasWarning) {
      const aSeverity = getMaxSeverity(aAllWarnings);
      const bSeverity = getMaxSeverity(bAllWarnings);
      return severityRank(bSeverity) - severityRank(aSeverity);
    }
    
    return 0;
  });
  
  if (sortedCities.length === 0) {
    container.innerHTML = '<div style="color:var(--text-secondary);font-size:12px;text-align:center;padding:20px;">暂无符合条件的标的</div>';
    return;

  sortedCities.forEach((cityName) => {
    const city = CITY_DATA[cityName];

    const allWarnings = getAllWarningsForCity(cityName);

    ).join('');
    
    const weatherText = weather.text || '--';
    const weatherDisplay = isSevere ? `<span class="severe-weather">${weatherText} ⚠️</span>` : weatherText;

    // 标的列表显示（默认只显示前5条）
    const displayProps = filteredProps.slice(0, 5);

    item.innerHTML = `
      <div class="city-header">
        <span class="city-name">
          ${cityName}
          <span class="city-count">${filteredProps.length}标的</span>
          ${warningTags}
        </span>
      </div>

            <br>&nbsp;&nbsp;&nbsp;📍 ${p.addr}
          </div>
        `).join('')}

function toggleExpand(btn, cityName) {
  const propList = document.querySelector(`.prop-list[data-city="${cityName}"]`);
  const items = propList.querySelectorAll('.prop-item');
  const isExpanded = btn.textContent.includes('收起');
  
  if (isExpanded) {

      item.style.display = idx >= 5 ? 'none' : 'block';
    });

  } else {

    });

function getWeatherIcon(text) {
  if (!text) return '🌤️';
  if (text.includes('雨')) return '🌧️';
  if (text.includes('雪')) return '❄️';
  if (text.includes('阴')) return '☁️';
  if (text.includes('晴')) return '☀️';
  if (text.includes('雷')) return '⛈️';
  if (text.includes('雾')) return '🌫️';
  return '🌤️';
}

function renderImpactAssessment() {
  const container = document.getElementById('impactAssessment');
  const impacts = [];
  
  const byType = {};
  Object.entries(cityWarningData).forEach(([qid, data]) => {
    const cityName = Object.entries(CITY_DATA).find(([_, c]) => c.qid === qid)?.[0];
    if (!cityName || isCityFiltered(cityName)) return;
    
    const filteredProps = getFilteredProps(cityName);
    if (filteredProps.length === 0) return;
    
    (data.warning || []).forEach(w => {
      const key = w.typeName || w.type;
      if (!byType[key]) byType[key] = [];
      if (!byType[key].includes(cityName)) {
        byType[key].push(cityName);
      }
    });
  });
  
  Object.entries(byType).forEach(([type, cities]) => {
    const props = cities.reduce((sum, c) => sum + getFilteredProps(c).length, 0);
    impacts.push({ type, cities, props });
  });
  
  container.innerHTML = impacts.map(impact => `
    <div class="impact-item ${impact.props > 10 ? 'high' : 'low'}">
      <strong>${impact.type}预警：</strong>
      影响${impact.cities.join('、')}等${impact.cities.length}城，共<span style="color:var(--warning-orange)">${impact.props}</span>个标的
    </div>
  `).join('') || '<div style="color:var(--text-secondary);font-size:12px;">暂无恶劣天气影响评估</div>';
}

function renderSummary() {
  const filteredCities = getFilteredCities();
  
  // 预警统计（预警数据不受筛选影响，显示全部）
  const filteredCityWarnings = Object.entries(cityWarningData).filter(([qid, data]) => 
    data.warning && data.warning.length > 0
  );
  
  const allWarnings = filteredCityWarnings.flatMap(([qid, data]) => data.warning);
  const activeWarnings = allWarnings.filter(w => w.status === 'active');
  
  // 筛选后的影响统计
  const affectedCitiesSet = new Set();
  let totalProps = 0;
  
  filteredCities.forEach(cityName => {
    const city = CITY_DATA[cityName];
    if (!city) return;
    
    const warnings = cityWarningData[city.qid]?.warning || [];
    const hasActiveWarning = warnings.some(w => w.status === 'active');
    
    if (hasActiveWarning) {
      affectedCitiesSet.add(cityName);
    }
    
    const filteredProps = getFilteredProps(cityName);
    if (filteredProps.length > 0) {
      totalProps += filteredProps.length;
    }
  });
  
  document.getElementById('totalWarnings').textContent = activeWarnings.length;
  document.getElementById('affectedCities').textContent = affectedCitiesSet.size;
  document.getElementById('affectedProps').textContent = totalProps;
}

    const endTime = w.endTime ? formatWarningTime(w.endTime) : '';
    const detail = w.text || w.detail || w.title || '';

    return `<div class="wd-item severity-${severityClass}">

    popup.style.left = '50%';

    popup.style.transform = 'translate(-50%, -50%)';
  }

      hour: '2-digit', minute: '2-digit'
    });
  } catch {
    return timeStr;
  }
}

// ========== 数据获取 ==========
// 检查每日API请求是否超限，超限返回true
function isApiLimitReached() {
  const today = new Date().toDateString();
  if (dailyApiCountDate !== today) {
    dailyApiCount = 0;
    dailyApiCountDate = today;
  }
  if (dailyApiCount >= DAILY_API_LIMIT) {
    console.warn(`[限流] 今日API请求已达${dailyApiCount}次，超过上限${DAILY_API_LIMIT}，停止请求`);
    return true;
  }
  return false;
}

// 记录一次API请求
function countApiRequest() {
  const today = new Date().toDateString();
  if (dailyApiCountDate !== today) {
    dailyApiCount = 0;
    dailyApiCountDate = today;
  }
  dailyApiCount++;
}

async function fetchWeather(qid) {
  if (isApiLimitReached()) return null;
  try {
    countApiRequest();
    const url = `https://${API_DOMAIN}/v7/weather/now?location=${qid}&key=${API_KEY}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('API error');
    const data = await resp.json();
    return data.code === '200' ? data.now : null;
  } catch {
    return null;
  }
}

// 将新版预警API的alerts映射为旧版格式（兼容下游代码）
function mapNewAlertToOld(alert) {
  // 新版字段：eventType.name, color.code, senderName, headline, description, messageType.code
  const colorToSeverity = { 'red': '红色', 'orange': '橙色', 'yellow': '黄色', 'blue': '蓝色', 'white': '白色', 'gray': '灰色', 'green': '绿色', 'purple': '紫色', 'black': '黑色' };
  const severity = colorToSeverity[alert.color?.code] || alert.severity || '蓝色';
  const typeName = alert.eventType?.name || '';
  const isActive = alert.messageType?.code !== 'cancel';
  return {
    id: alert.id || '',
    sender: alert.senderName || '',
    pubTime: alert.issuedTime || '',
    title: alert.headline || (typeName + severity + '预警'),
    startTime: alert.effectiveTime || '',
    endTime: alert.expireTime || '',
    status: isActive ? 'active' : 'cancel',
    level: severity,
    severity: severity,
    type: alert.eventType?.code || '',
    typeName: typeName,
    text: alert.description || alert.instruction || '',
    headline: alert.headline || '',
    description: alert.description || '',
    instruction: alert.instruction || '',
    source: 'API'
  };
}

async function fetchWarnings(qid) {
  if (isApiLimitReached()) return [];
  // 如果已知预警API不可用，直接走降级方案
  if (warningApiStatus === 'failed') {
    return getBadWeatherFallback(qid);
  }
  
  try {
    countApiRequest();
    // 从CITY_DATA查找城市的经纬度
    const cityEntry = Object.entries(CITY_DATA).find(([_, c]) => c.qid === qid);
    if (!cityEntry) {
      console.warn('未找到qid对应的城市:', qid);
      return [];
    }
    const [cityName, cityInfo] = cityEntry;
    const lat = cityInfo.lat;
    const lon = cityInfo.lon;
    
    // 新版预警API：/weatheralert/v1/current/{lat}/{lon}?key=xxx
    const url = `https://${WARNING_API_DOMAIN}/weatheralert/v1/current/${lat}/${lon}?key=${WARNING_API_KEY}`;
    const resp = await fetch(url);
    
    if (!resp.ok) {
      console.warn(`新版预警API返回${resp.status}，尝试备用API`);
      return tryFallbackWarningApi(qid, lat, lon);
    }
    
    const data = await resp.json();
    
    // 新版API用metadata.zeroResult判断是否有数据
    if (data.metadata) {
      warningApiStatus = 'ok';
      if (data.metadata.zeroResult || !data.alerts || data.alerts.length === 0) {
        return [];
      }
      // 映射新版格式为旧版格式
      return data.alerts.map(mapNewAlertToOld);
    }
    
    // 兼容旧版返回格式（code字段）
    if (data.code === '200') {
      warningApiStatus = 'ok';
      return (data.warning || []).map(w => ({
        ...w,
        severity: w.severity || w.level || '蓝色',
        typeName: w.typeName || w.type || '',
        text: w.text || w.detail || ''
      }));
    }
    
    if (data.code === '204') {
      warningApiStatus = 'ok';
      return [];
    }
    
    // 其他错误，尝试备用
    return tryFallbackWarningApi(qid, lat, lon);
    
  } catch (e) {
    console.warn('预警API请求异常:', e.message, '，尝试备用API');
    return tryFallbackWarningApi(qid);
  }
}

// 备用预警API尝试
async function tryFallbackWarningApi(qid, lat, lon) {
  try {
    // 如果没传经纬度，从CITY_DATA查找
    if (!lat || !lon) {
      const cityEntry = Object.entries(CITY_DATA).find(([_, c]) => c.qid === qid);
      if (cityEntry) {
        lat = cityEntry[1].lat;
        lon = cityEntry[1].lon;
      }
    }
    if (!lat || !lon) {
      warningApiStatus = 'failed';
      return getBadWeatherFallback(qid);
    }
    
    const url = `https://${WARNING_API_DOMAIN_FALLBACK}/weatheralert/v1/current/${lat}/${lon}?key=${WARNING_API_KEY_FALLBACK}`;
    const resp = await fetch(url);
    
    if (!resp.ok) {
      console.warn('备用预警API也返回错误', resp.status, '，走降级方案');
      warningApiStatus = 'failed';
      return getBadWeatherFallback(qid);
    }
    
    const data = await resp.json();
    
    if (data.metadata) {
      warningApiStatus = 'ok';
      if (data.metadata.zeroResult || !data.alerts || data.alerts.length === 0) {
        return [];
      }
      return data.alerts.map(mapNewAlertToOld);
    }
    
    if (data.code === '200') {
      warningApiStatus = 'ok';
      return (data.warning || []).map(w => ({
        ...w,
        severity: w.severity || w.level || '蓝色',
        typeName: w.typeName || w.type || '',
        text: w.text || w.detail || ''
      }));
    }
    
    if (data.code === '204') {
      warningApiStatus = 'ok';
      return [];
    }
    
    warningApiStatus = 'failed';
    return getBadWeatherFallback(qid);
    
  } catch (e) {
    console.warn('备用预警API请求异常:', e.message);
    warningApiStatus = 'failed';
    return getBadWeatherFallback(qid);
  }
}

// 降级方案：通过天气API判断恶劣天气
async function getBadWeatherFallback(qid) {
  try {
    // 优先复用已缓存的天气数据
    const weather = cityWeatherData[qid];
    if (!weather || !weather.text) return [];
    
    const text = weather.text;
    
    // 天气描述→预警类型+严重级别映射
    const warningMap = [
      { keywords: ['特大暴雨'], typeName: '暴雨', severity: '红色' },
      { keywords: ['大暴雨'], typeName: '暴雨', severity: '橙色' },
      { keywords: ['暴雨'], typeName: '暴雨', severity: '黄色' },
      { keywords: ['雷阵雨', '雷电', '雷'], typeName: '雷电', severity: '黄色' },
      { keywords: ['台风'], typeName: '台风', severity: '橙色' },
      { keywords: ['强对流'], typeName: '强对流', severity: '黄色' },
      { keywords: ['冰雹'], typeName: '冰雹', severity: '橙色' },
    ];
    
    let matched = null;
    for (const m of warningMap) {
      if (m.keywords.some(kw => text.includes(kw))) {
        matched = m;
        break;
      }
    }
    
    // 台风大风等级判断（仅台风类型，大风等级>=8视为台风影响）
    if (!matched && weather.windScale && parseInt(weather.windScale) >= 10) {
      matched = { typeName: '台风', severity: parseInt(weather.windScale) >= 12 ? '红色' : '橙色' };
    }
    
    if (!matched) return [];
    
    // 检查是否属于FOCUS_WARNING_TYPES
    if (!FOCUS_WARNING_TYPES.some(ft => matched.typeName.includes(ft))) return [];
    
    // 检查是否属于FOCUS_WARNING_LEVELS（过滤蓝色）
    if (!FOCUS_WARNING_LEVELS.includes(matched.severity)) return [];
    
    // 找到对应的城市名称
    const cityEntry = Object.entries(CITY_DATA).find(([_, c]) => c.qid === qid);
    const cityName = cityEntry ? cityEntry[0] : qid;
    
    return [{
      id: `fallback_${qid}`,
      provinceName: weather.provinceName || '',
      cityName: cityName,
      title: `${cityName}发布${matched.typeName}${matched.severity}预警`,
      description: `${text}，温度${weather.temp || ''}℃，${weather.windDir || ''}${weather.windScale || ''}级`,
      severity: matched.severity,
      typeName: matched.typeName,
      text: `天气实况检测到恶劣天气：${text}`,
      sender: '天气实况降级',
      source: '降级',
      status: 'active'
    }];
  } catch (e) {
    console.warn('降级方案异常:', e.message);
    return [];
  }
}

async function fetchForecast(qid) {

    const resp = await fetch(url);

// 分批获取天气数据（避免限流）
async function fetchWeatherBatch(cities, delay = 200) {
  const results = {};
  for (let i = 0; i < cities.length; i += 5) {
    const batch = cities.slice(i, i + 5);
    const promises = batch.map(async ([_, city]) => {
      const weather = await fetchWeather(city.qid);
      if (weather) {
        results[city.qid] = weather;
      }
    });
    await Promise.all(promises);
    if (i + 5 < cities.length) {
      await new Promise(resolve => setTimeout(resolve, delay));
    }
  }
  return results;
}

// 分批获取预警数据
async function fetchWarningsBatch(cities, delay = 200) {
  const results = {};
  for (let i = 0; i < cities.length; i += 5) {
    const batch = cities.slice(i, i + 5);
    const promises = batch.map(async ([_, city]) => {
      const warnings = await fetchWarnings(city.qid);
      if (warnings !== null) {
        const filtered = filterWarnings(warnings);
        if (filtered.length > 0) {
          results[city.qid] = { warning: filtered };
        }
      }
    });
    await Promise.all(promises);
    if (i + 5 < cities.length) {
      await new Promise(resolve => setTimeout(resolve, delay));
    }
  }
  return results;
}



// ========== 工具函数 ==========
function getCityWarnings(cityName) {
  const city = CITY_DATA[cityName];
  if (!city) return [];
  return cityWarningData[city.qid]?.warning || [];
}

function getAllWarningsForCity(cityName) {
  return getCityWarnings(cityName);
}

function hasSevereWeather(cityName) {
  const city = CITY_DATA[cityName];
  if (!city) return false;
  const weather = cityWeatherData[city.qid];
  if (!weather || !weather.text) return false;
  return SEVERE_WEATHER_KEYWORDS.some(kw => weather.text.includes(kw));
}

function getMaxSeverity(warnings) {
  if (!warnings.length) return '';
  const w = warnings.find(w => w.severity);
  return w ? w.severity : '';
}

function severityRank(severity) {
  const ranks = { '红色': 4, '橙色': 3, '黄色': 2, '蓝色': 1 }; // 蓝色虽不在展示范围，排序仍需兼容
  return ranks[severity] || 0;
}

  if (mapContent) {
    const transform = `translate(${mapOffsetX}, ${mapOffsetY}) scale(${mapScale})`;
    mapContent.setAttribute('transform', transform);
  }
  // 更新缩放显示
  const zoomLevel = document.getElementById('zoomLevel');
  if (zoomLevel) {
    zoomLevel.textContent = Math.round(mapScale * 100) + '%';
  }
}

function zoomAtPoint(delta, clientX, clientY) {
  const svg = document.getElementById('chinaMap');
  const container = svg.closest('.map-container');
  if (!container) return;
  
  const rect = container.getBoundingClientRect();
  // 鼠标在容器内的相对位置
  const mouseX = clientX - rect.left;
  const mouseY = clientY - rect.top;
  
  // SVG坐标变换
  const scaleFactor = delta > 0 ? 1.1 : 0.9;
  const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, mapScale * scaleFactor));
  
  if (newScale === mapScale) return;
  
  // 计算新的偏移量，使缩放中心在鼠标位置
  const scaleChange = newScale / mapScale;
  mapOffsetX = mouseX - (mouseX - mapOffsetX) * scaleChange;
  mapOffsetY = mouseY - (mouseY - mapOffsetY) * scaleChange;
  mapScale = newScale;
  
  updateMapTransform();
}

function handleWheel(e) {
  e.preventDefault();
  zoomAtPoint(e.deltaY * -1, e.clientX, e.clientY);
}

function handleMouseDown(e) {
  // 只在SVG区域且不是按钮时响应拖拽
  if (e.target.closest('.zoom-controls') || e.target.closest('button')) return;
  if (e.button !== 0) return; // 只响应左键
  
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  lastOffsetX = mapOffsetX;
  lastOffsetY = mapOffsetY;
  
  const svg = document.getElementById('chinaMap');
  svg.style.cursor = 'grabbing';
}

function handleMouseMove(e) {
  if (!isDragging) return;
  
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;
  
  mapOffsetX = lastOffsetX + dx;
  mapOffsetY = lastOffsetY + dy;
  
  updateMapTransform();
}

function handleMouseUp() {
  if (isDragging) {
    isDragging = false;
    const svg = document.getElementById('chinaMap');
    svg.style.cursor = 'grab';
  }
}

function zoomIn() {
  const svg = document.getElementById('chinaMap');
  const rect = svg.getBoundingClientRect();
  zoomAtPoint(1, rect.left + rect.width / 2, rect.top + rect.height / 2);
}

function zoomOut() {
  const svg = document.getElementById('chinaMap');
  const rect = svg.getBoundingClientRect();
  zoomAtPoint(-1, rect.left + rect.width / 2, rect.top + rect.height / 2);
}

function zoomReset() {
  mapScale = 1;
  mapOffsetX = 0;
  mapOffsetY = 0;
  updateMapTransform();
}

// 双击缩放功能
function handleDoubleClick(e) {
  const target = e.target;
  // 检查是否点击了省份或城市标记
  if (target.closest('#provinces path') || target.closest('.city-marker')) {
    const svg = document.getElementById('chinaMap');
    const rect = svg.getBoundingClientRect();
    // 放大2倍，以点击位置为中心
    zoomAtPoint(1, e.clientX, e.clientY);
  }
}

// 获取SVG坐标（考虑缩放和偏移）
function getSVGPoint(clientX, clientY) {
  const svg = document.getElementById('chinaMap');
  const container = svg.closest('.map-container');
  const rect = container.getBoundingClientRect();
  
  // 获取当前视口的实际尺寸
  const viewBox = svg.viewBox.baseVal;
  const scaleX = viewBox.width / rect.width;
  const scaleY = viewBox.height / rect.height;
  
  // 鼠标相对于容器的位置
  const mouseX = clientX - rect.left;
  const mouseY = clientY - rect.top;
  
  // 应用缩放和平移的逆变换
  const svgX = (mouseX - mapOffsetX) / mapScale;
  const svgY = (mouseY - mapOffsetY) / mapScale;
  
  return { x: svgX, y: svgY };
}

function initMapZoom() {
  const svg = document.getElementById('chinaMap');
  const container = svg.closest('.map-container');
  
  // 添加鼠标滚轮缩放
  svg.addEventListener('wheel', handleWheel, { passive: false });
  
  // 添加拖拽平移
  svg.addEventListener('mousedown', handleMouseDown);
  document.addEventListener('mousemove', handleMouseMove);
  document.addEventListener('mouseup', handleMouseUp);
  
  // 添加双击缩放
  svg.addEventListener('dblclick', handleDoubleClick);
  
  // 添加按钮事件
  document.getElementById('zoomIn').addEventListener('click', zoomIn);
  document.getElementById('zoomOut').addEventListener('click', zoomOut);
  document.getElementById('zoomReset').addEventListener('click', zoomReset);
  
  // 设置初始光标
  svg.style.cursor = 'grab';
  
  // 初始化transform
  updateMapTransform();
}

// ========== 定时调度 ==========
let scheduleCheckTimer = null;
const REFRESH_INTERVAL = 30 * 60 * 1000; // 30分钟自动刷新一次

// 统一刷新时间：每天12:00（天气+预警一起更新）
const REFRESH_HOUR = 12;

// 记录今天是否已执行过定时刷新
let todayRefreshed = { date: '' };

// 检查并执行定时刷新（每分钟检查一次）
function checkScheduledRefresh() {
  const now = new Date();
  const hour = now.getHours();
  const minute = now.getMinutes();
  const todayStr = now.toDateString();
  
  // 跨天重置执行记录和API计数
  if (todayRefreshed.date !== todayStr) {
    todayRefreshed = { date: todayStr };
  }
  if (dailyApiCountDate !== todayStr) {
    dailyApiCount = 0;
    dailyApiCountDate = todayStr;
  }
  
  // 整点12:00触发统一刷新
  if (hour === REFRESH_HOUR && minute === 0 && !todayRefreshed[REFRESH_HOUR]) {
    todayRefreshed[REFRESH_HOUR] = true;
    console.log(`[定时] ${REFRESH_HOUR}:00 执行统一刷新（天气+预警）`);
    refreshData();
  }
}

// 全量刷新：从共享数据源获取数据（不直接调用天气API）
async function refreshData() {
  document.getElementById('refreshTime').textContent = '正在更新...';
  
  try {
    // 添加缓存破坏参数，确保获取最新数据
    const fetchUrl = SHARED_DATA_URL + '?_t=' + Date.now();
    const resp = await fetch(fetchUrl);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const sharedData = await resp.json();
    
    // 填充天气数据
    cityWeatherData = {};
    if (sharedData.weather) {
      Object.entries(sharedData.weather).forEach(([qid, data]) => {
        cityWeatherData[qid] = data;
      });
    }
    
    // 填充预警数据
    cityWarningData = {};
    if (sharedData.warning) {
      Object.entries(sharedData.warning).forEach(([qid, data]) => {
        cityWarningData[qid] = data;
      });
    }
    
    // 填充预报数据
    cityForecastData = {};
    if (sharedData.forecast) {
      Object.entries(sharedData.forecast).forEach(([qid, data]) => {
        cityForecastData[qid] = data;
      });
    }
    
    // 更新UI
    renderCityMarkers();
    renderCityList();
    renderSummary();
    renderImpactAssessment();
    
    const ts = formatTime(new Date());
    const dataTime = sharedData.updateTime ? sharedData.updateTime.replace('T', ' ').substring(0, 16) : ts;
    document.getElementById('refreshTime').textContent = `更新: ${dataTime}`;
    document.getElementById('warningRefreshTime').textContent = `共享数据同步`;
    
    console.log(`[共享数据] 加载完成: 天气${Object.keys(cityWeatherData).length}城, 预警${Object.keys(cityWarningData).length}城, 预报${Object.keys(cityForecastData).length}城`);
  } catch (e) {
    console.error('[共享数据] 加载失败:', e.message);
    document.getElementById('refreshTime').textContent = '数据加载失败，请刷新重试';
  }
}

// ========== 初始化 ==========
function init() {
  document.getElementById('wdClose').addEventListener('click', hideWarningDetail);
  document.addEventListener('click', (e) => {
    const popup = document.getElementById('warningDetailPopup');
    if (popup.style.display === 'block' && !popup.contains(e.target) && !e.target.closest('.warning-badge[data-city-warning]') && !e.target.closest('.city-marker')) {
      hideWarningDetail();
    }
  });
  
  // 初始化地图缩放
  initMapZoom();
  
  renderCityMarkers();
  renderCityList();
  renderSummary();
  renderImpactAssessment();
  
  // 首次加载：全量刷新一次
  refreshData();
  
  // 定时调度：每30分钟从共享数据源刷新一次
  scheduleCheckTimer = setInterval(refreshData, REFRESH_INTERVAL);
}

// 启动
init();
</script>
